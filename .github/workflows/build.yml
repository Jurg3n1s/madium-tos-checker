name: Build Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install esbuild
        run: npm install -g esbuild typescript

      - name: Bundle plugin
        run: |
          esbuild src/index.ts \
            --bundle \
            --outfile=dist/index.js \
            --format=cjs \
            --external:@vendetta \
            --external:@vendetta/* \
            --jsx=transform \
            --jsx-factory=React.createElement \
            --jsx-fragment=React.Fragment \
            --platform=browser

      - name: Commit dist output
        run: |
          mkdir -p dist
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: build plugin [skip ci]"
          git push